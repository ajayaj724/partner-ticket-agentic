name: DPIA refresh gate

# REQ: SAFE-02 (v1.1 production-readiness gap closure)
#
# A PR that changes the approved-model list or any provider implementation
# is a model-version change under the EU AI Act limited-risk classification.
# Each such change requires a Data Protection Impact Assessment refresh per
# docs/AI_ACT_ASSESSMENT.md §5. This workflow surfaces the requirement to
# reviewers as a sticky comment on the PR — it does NOT fail the build.
# The intent is awareness, not enforcement (the wrong tool for the latter
# is a workflow; the right tool is the assessment process itself).
#
# Security note: all PR-supplied values (file paths from `git diff`) flow
# through env vars and process.env into the github-script step, never via
# `${{ }}` interpolation into shell or JS literal context. See
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  pull_request:
    branches: [main]
    paths:
      - 'config/approved_models.yaml'
      - 'src/partner_ticket_agentic/providers/**'
      - 'src/partner_ticket_agentic/agents/triage.py'
      - 'src/partner_ticket_agentic/agents/watchdog.py'
      - 'src/partner_ticket_agentic/agents/insights.py'

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identify what triggered the gate
        id: triggered_paths
        run: |
          # Capture matching changed files. The `paths:` filter has already
          # narrowed the trigger; this enumerates the actual files for the
          # comment body. Truncated to 20 lines.
          FILES=$(git diff --name-only "origin/main...HEAD" -- \
            config/approved_models.yaml \
            src/partner_ticket_agentic/providers/ \
            src/partner_ticket_agentic/agents/triage.py \
            src/partner_ticket_agentic/agents/watchdog.py \
            src/partner_ticket_agentic/agents/insights.py \
            2>/dev/null | head -20)
          {
            echo "files<<DPIA_GATE_EOF"
            printf '%s\n' "$FILES"
            echo "DPIA_GATE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update DPIA reminder
        env:
          TRIGGERED_FILES: ${{ steps.triggered_paths.outputs.files }}
        uses: actions/github-script@v7
        with:
          script: |
            // SECURITY: read the file list from the environment variable, never
            // from `${{ }}` interpolation inside the JS source. Even though the
            // values come from our own `git diff` output (filtered by paths:),
            // routing through process.env keeps the JS literal context clean.
            const triggered = (process.env.TRIGGERED_FILES || '').trim();

            const body = [
              '## ⚠️ DPIA refresh required',
              '',
              'This PR changes the approved-model list or a path that affects which',
              'model the LLM-calling agents (F1 Triage, F8 Watchdog, F9 Insights) use.',
              '',
              'Per `docs/AI_ACT_ASSESSMENT.md` §5, a model-version change requires',
              'a **Data Protection Impact Assessment refresh** before merge:',
              '',
              '1. Re-run the assessment checklist in `docs/AI_ACT_ASSESSMENT.md` §5',
              '2. Confirm the new model preserves the *limited-risk* classification',
              '3. Update the "Last reviewed" date in `docs/AI_ACT_ASSESSMENT.md`',
              '4. Append a sign-off line in the PR description: `DPIA refreshed: <name> <YYYY-MM-DD>`',
              '',
              '**Triggering files:**',
              '```',
              triggered || '(no diff against origin/main yet)',
              '```',
              '',
              'This gate is informational, not blocking. A maintainer reviewing the',
              'PR is expected to confirm DPIA sign-off before approving.',
              '',
              '_REQ SAFE-02 · auto-generated by `.github/workflows/dpia-gate.yml`_',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '_REQ SAFE-02 · auto-generated by';
            const existing = comments.find(c => (c.body || '').includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing DPIA comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Created new DPIA comment');
            }
